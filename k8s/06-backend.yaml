apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nexomark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nexomark-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: nexomark-config
                  key: PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: nexomark-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: nexomark-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: nexomark-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: nexomark-config
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: nexomark-secret
                  key: DB_PASS
            - name: ADMIN_USER
              valueFrom:
                configMapKeyRef:
                  name: nexomark-config
                  key: ADMIN_USER
            - name: ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: nexomark-secret
                  key: ADMIN_PASS
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: nexomark-config
                  key: CORS_ORIGIN
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: nexomark
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
